name: Deploy to Azure Web App with Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Azure App Service에 소스코드를 압축하여 전달 (Azure 내장 컨테이너 빌드 유도)
      # 이렇게 하면 Azure 가 내부 엔진으로 Dockerfile을 읽어 직접 컨테이너를 빌드합니다.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'my-cicd-app' # 👈 본인의 Azure 웹앱 이름 확인 완료!
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '.' # 이미지를 지정하는 대신 소스코드 패키지 통째로 넘깁니다.