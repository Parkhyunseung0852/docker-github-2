name: Docker Hub to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 도커 허브 로그인 (2단계에서 설정한 Secret 사용)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 도커 이미지 빌드 및 도커 허브로 push 실행
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest

      # 4. Azure App Service에 배포 신호 전달 (1단계에서 설정한 도커 허브 주소 매핑)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'my-cicd-app' # 👈 본인의 Azure 웹앱 이름 그대로 유지!
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest'